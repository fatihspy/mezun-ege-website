<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Sayfa Bulunamadı - Egemyo Mezun</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Montserrat',sans-serif; }
        body {
            background:linear-gradient(135deg, #f0f4f8 0%, #e8f4fd 100%);
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            padding:24px;
        }
        .kart {
            background:white; border-radius:24px; padding:52px 48px;
            text-align:center; max-width:480px; width:100%;
            box-shadow:0 20px 60px rgba(0,0,0,0.1);
        }
        .hata-kodu {
            font-size:96px; font-weight:700;
            background:linear-gradient(135deg,#0077b5,#00a0dc);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            line-height:1; margin-bottom:8px;
        }
        .emoji { font-size:52px; margin-bottom:20px; display:block; }
        h1 { font-size:24px; font-weight:700; color:#1a202c; margin-bottom:12px; }
        p  { font-size:15px; color:#718096; line-height:1.7; margin-bottom:32px; }
        .btn-wrap { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
        .btn-ana {
            background:linear-gradient(135deg,#0077b5,#005f8e); color:white;
            border:none; padding:13px 28px; border-radius:12px;
            font-size:14px; font-weight:600; cursor:pointer;
            text-decoration:none; display:inline-block;
            box-shadow:0 4px 14px rgba(0,119,181,0.35); transition:all 0.2s;
        }
        .btn-ana:hover { transform:translateY(-2px); }
        .btn-geri {
            background:#f3f4f6; color:#4a5568;
            border:2px solid #e1e5e9; padding:13px 28px; border-radius:12px;
            font-size:14px; font-weight:600; cursor:pointer;
            text-decoration:none; display:inline-block; transition:all 0.2s;
        }
        .btn-geri:hover { background:#e1e5e9; }
        .logo {
            display:flex; align-items:center; justify-content:center; gap:10px;
            margin-bottom:32px;
        }
        .logo-daire {
            width:40px; height:40px; border-radius:10px;
            background:linear-gradient(135deg,#0077b5,#00a0dc);
            display:flex; align-items:center; justify-content:center;
            font-size:20px; font-weight:700; color:white;
        }
        .logo h2 { font-size:20px; font-weight:700; color:#0077b5; }
    </style>
</head>
<body>
    <div class="kart">
        <div class="logo">
            <div class="logo-daire">E</div>
            <h2>Egemyo Mezun</h2>
        </div>
        <span class="emoji">🗺️</span>
        <div class="hata-kodu">404</div>
        <h1>Sayfa Bulunamadı</h1>
        <p>Aradığınız sayfa mevcut değil ya da taşınmış olabilir.<br>Endişelenmeyin, sizi doğru yere götürelim!</p>
        <div class="btn-wrap">
            <a href="/dashboard/dashboard.html" class="btn-ana">🏠 Ana Sayfaya Git</a>
            <a href="javascript:history.back()" class="btn-geri">← Geri Dön</a>
        </div>
    </div>
    <script>
        // Token yoksa giriş ekranına yönlendir
        if (!localStorage.getItem('token')) {
            document.querySelector('.btn-ana').href = '/giris_ekrani/index.html';
            document.querySelector('.btn-ana').textContent = '🔑 Giriş Yap';
        }
    </script>
</body>
</html>
