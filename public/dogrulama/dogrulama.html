<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <title>Email Doğrulama - Egemyo Mezun</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', -apple-system, 'Segoe UI', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 48px 40px; max-width: 480px; width: 100%; }
        .logo { text-align: center; margin-bottom: 32px; }
        .logo h1 { color: #0077b5; font-size: 28px; font-weight: 700; }
        .verif-icon { text-align: center; margin-bottom: 32px; font-size: 64px; }
        h2 { text-align: center; color: #1a202c; font-size: 24px; margin-bottom: 12px; font-weight: 600; }
        .subtitle { text-align: center; color: #718096; font-size: 15px; margin-bottom: 32px; line-height: 1.6; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #2d3748; font-weight: 600; font-size: 14px; margin-bottom: 10px; }
        input[type="text"], input[type="email"] { 
            width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px;
            font-size: 15px; transition: all 0.3s; font-family: 'Courier New', monospace;
            letter-spacing: 4px; text-align: center; font-weight: 600;
        }
        input:focus { outline: none; border-color: #0077b5; box-shadow: 0 0 0 3px rgba(0,119,181,0.1); }
        .buttons { display: flex; gap: 12px; margin-top: 20px; }
        button { flex: 1; padding: 12px 20px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.3s; font-family: 'Montserrat', sans-serif; }
        .btn-verify { background: linear-gradient(135deg, #0077b5, #005f8e); color: white; }
        .btn-verify:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,119,181,0.4); }
        .btn-cancel { background: #e2e8f0; color: #4a5568; }
        .btn-cancel:hover { background: #cbd5e0; }
        .help-text { text-align: center; color: #a0aec0; font-size: 13px; margin-top: 24px; line-height: 1.6; }
        .error { color: #e53e3e; background: #fff5f5; padding: 12px 16px; border-radius: 8px; border-left: 4px solid #e53e3e; margin-bottom: 16px; font-size: 13px; }
        .success { color: #276749; background: #f0fdf4; padding: 12px 16px; border-radius: 8px; border-left: 4px solid #22c55e; margin-bottom: 16px; font-size: 13px; }
        .loading { opacity: 0.6; pointer-events: none; }
        .spinner { display: inline-block; width: 16px; height: 16px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .resend-link { text-align: center; margin-top: 20px; }
        .resend-link a { color: #0077b5; text-decoration: none; font-weight: 600; font-size: 13px; border-bottom: 1px solid currentColor; }
        .resend-link a:hover { color: #005f8e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
    <script src="/utils/common.js"></script>
            <h1>Egemyo Mezun</h1>
        </div>

        <div class="verif-icon">✉️</div>

        <h2>Email Doğrula</h2>
        <p class="subtitle">Kayıt işlemini tamamlamak için email adresinize gelen 6 haneli doğrulama kodunu girin.</p>

        <form id="verifForm">
            <div id="errorMsg"></div>
            <div id="successMsg"></div>

            <div class="form-group">
                <label for="email">Email Adres</label>
                <input type="email" id="email" placeholder="example@ogrenci.ege.edu.tr" disabled readonly style="background:#f7fafc;cursor:not-allowed;">
            </div>

            <div class="form-group">
                <label for="kod">Doğrulama Kodu (6 haneli)</label>
                <input type="text" id="kod" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" required>
            </div>

            <div class="buttons">
                <button type="submit" class="btn-verify">Doğrula</button>
                <button type="button" class="btn-cancel" onclick="window.location.href='../giris_ekrani/index.html'">İptal</button>
            </div>
        </form>

        <div class="resend-link">
            <p style="color:#718096;font-size:13px;margin-bottom:12px;">Kod gelmediyse:</p>
            <a href="javascript:void(0)" onclick="yeniKodGonder()">Yeni bir kod gönder</a>
        </div>

        <div class="help-text">
            <p>💡 <strong>İpucu:</strong> Doğrulama kodu email adresinize gönderilmiştir. Spam klasörünü de kontrol edin.</p>
        </div>
    </div>

    <script src="../config.js"></script>
    <script>
        const kullaniciObj = JSON.parse(localStorage.getItem('kullanici') || '{}');
        const kullaniciEmail = kullaniciObj.email || localStorage.getItem('email') || '';

        // Backend'e sorup doğrula (cookie-based)
        (async () => {
            try {
                const r = await fetch(CONFIG.AUTH_URL + '/ben', { credentials: 'include' });
                const j = await r.json();
                if (!j.basarili) window.location.href = '../giris_ekrani/index.html';
            } catch(e) { /* ağ hatası: yönlendirilmeyebilir */ }
        })();

        // Email'i göster
        document.getElementById('email').value = kullaniciEmail || 'Bilgi alınıyor...';

        // Doğrulama formu
        document.getElementById('verifForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const kod = document.getElementById('kod').value.trim();
            
            if (kod.length !== 6) {
                showError('Lütfen 6 haneli kodu girin.');
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Doğrulanıyor...';

            try {
                const response = await fetch(CONFIG.AUTH_URL + '/verify-email', {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: kod })
                });

                const data = await response.json();

                if (data.basarili) {
                    showSuccess('Email başarıyla doğrulandı! ✅ Yönlendiriliyorsunuz...');
                    // Profil doldurmayı atlatmamak için backend'den kontrol et
                    const kullaniciGuncel = JSON.parse(localStorage.getItem('kullanici') || '{}');
                    const isIsveren = kullaniciGuncel.rol?.includes('isveren');
                    let hedef;
                    if (isIsveren) {
                        hedef = kullaniciGuncel.profilTamamlandi
                            ? '../isveren/isveren.html'
                            : '../profil_doldurma_isveren/profil_doldurma_isveren.html';
                    } else {
                        hedef = kullaniciGuncel.profilTamamlandi
                            ? '../dashboard/dashboard.html'
                            : '../profil_doldurma/profil_doldurma.html';
                    }
                    setTimeout(() => {
                        window.location.href = hedef;
                    }, 2000);
                } else {
                    showError(data.mesaj || 'Doğrulama başarısız.');
                    btn.disabled = false;
                    btn.innerHTML = 'Doğrula';
                }
            } catch (err) {
                showError('Bir hata oluştu: ' + err.message);
                btn.disabled = false;
                btn.innerHTML = 'Doğrula';
            }
        });

        let geriSayimId = null;

        function yeniKodGonder() {
            const btn = event.target;
            btn.style.pointerEvents = 'none';

            fetch(CONFIG.AUTH_URL + '/resend-verification-code', {
                method: 'POST',
                credentials: 'include'
            }).then(r => r.json()).then(data => {
                if (data.basarili) {
                    showSuccess(data.mesaj);
                    // 60 saniyelik geri sayım — spam önlemi
                    let kalan = 60;
                    btn.textContent = `Yeni kod gönder (${kalan}s)`;
                    clearInterval(geriSayimId);
                    geriSayimId = setInterval(() => {
                        kalan--;
                        if (kalan <= 0) {
                            clearInterval(geriSayimId);
                            btn.textContent = 'Yeni bir kod gönder';
                            btn.style.pointerEvents = 'auto';
                        } else {
                            btn.textContent = `Yeni kod gönder (${kalan}s)`;
                        }
                    }, 1000);
                } else {
                    showError(data.mesaj || 'Hata oluştu');
                    btn.style.pointerEvents = 'auto';
                }
            }).catch(err => {
                showError('Hata: ' + err.message);
                btn.style.pointerEvents = 'auto';
            });
        }

        function showError(msg) {
            const div = document.getElementById('errorMsg');
            div.innerHTML = `<div class="error">${msg}</div>`;
            document.getElementById('successMsg').innerHTML = '';
        }

        function showSuccess(msg) {
            const div = document.getElementById('successMsg');
            div.innerHTML = `<div class="success">${msg}</div>`;
            document.getElementById('errorMsg').innerHTML = '';
        }

        // Kodu formatlama (otomatik)
        document.getElementById('kod').addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
        });
    </script>
</body>
</html>
